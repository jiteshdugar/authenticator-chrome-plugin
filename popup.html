<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity Authenticator</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-container">
        <img src="icons/icon-48.png" alt="Logo" class="mini-logo">
        <h1>Authenticator</h1>
      </div>
      <div class="header-actions">
        <button id="search-btn" class="icon-btn" title="Search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
      </div>
    </header>

    <!-- Search Overlay -->
    <div id="search-overlay" class="search-overlay hidden">
      <input type="text" id="search-input" placeholder="Search accounts..." autofocus>
      <button id="close-search" class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
    </div>

    <!-- Main Content Area -->
    <main id="main-content" class="content-scroll">
      <!-- Home View (Accounts List) -->
      <section id="view-home" class="view">
        <div id="accounts-list" class="accounts-list">
          <!-- Account cards will be injected here -->
          <div class="empty-state">
            <div class="empty-icon">🛡️</div>
            <p>No accounts yet.</p>
            <button id="empty-add-btn" class="btn btn-primary">Add your first account</button>
          </div>
        </div>
      </section>

      <!-- Add View -->
      <section id="view-add" class="view hidden">
        <div class="view-header">
          <h2>Add Account</h2>
          <button class="back-btn icon-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></button>
        </div>
        
        <div class="add-options">
          <button id="scan-qr-btn" class="option-card">
            <div class="option-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></div>
            <span>Scan QR Code</span>
            <small>Snap from current page</small>
          </button>
          <div class="divider"><span>OR</span></div>
          <form id="manual-add-form" class="manual-form">
            <div class="form-group">
              <label for="code-name">Account Name</label>
              <input type="text" id="code-name" placeholder="e.g. Google, GitHub" required>
            </div>
            <div class="form-group">
              <label for="setup-key">Setup Key</label>
              <input type="text" id="setup-key" placeholder="Enter key" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="key-type">Type</label>
                <select id="key-type">
                  <option value="TOTP">Time-based</option>
                  <option value="HOTP">Counter-based</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Add Account</button>
          </form>
        </div>
      </section>

      <!-- Settings View -->
      <section id="view-settings" class="view hidden">
        <div class="view-header">
          <h2>Settings</h2>
          <button class="back-btn icon-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></button>
        </div>
        <div class="settings-list">
          <div class="settings-group">
            <h3>Backup</h3>
            <button id="export-btn" class="settings-item">
              <div class="item-info">
                <span>Export Codes</span>
                <small>Download as JSON file</small>
              </div>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>
            <div class="settings-item">
              <div class="item-info">
                <span>Import Codes</span>
                <small>Restore from JSON file</small>
              </div>
              <label for="import-file" class="import-label">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
              </label>
              <input type="file" id="import-file" accept=".json" hidden>
            </div>
          </div>
          
          <div class="settings-group">
            <h3>About</h3>
            <div class="settings-item no-hover">
              <div class="item-info">
                <span>Version</span>
                <small>1.0.0</small>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Navigation Bar -->
    <nav class="app-nav">
      <button data-view="home" class="nav-btn active">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>Home</span>
      </button>
      <button data-view="add" class="nav-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span>Add</span>
      </button>
      <button data-view="settings" class="nav-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        <span>Settings</span>
      </button>
    </nav>

    <!-- Notifications Toast -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="libs/otpauth.umd.js"></script>
  <script src="libs/jsQR.js"></script>
  <script src="scripts/storage-manager.js"></script>
  <script src="scripts/otp-logic.js"></script>
  <script src="scripts/popup.js"></script>
</body>
</html>
